{% extends "base.html" %}

{% block content %}

<section class="mb-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <h1 class="my-3">Delete review<span class="accent-dot"></span></h1>
            <p class="text-muted">
                Are you sure you want to delete your review for this movie?
            </p>
            <div class="card mt-3">
                <div class="card-body">
                    <h2 class="h5 card-title">
                        {{ review.movie.title }}
                    </h2>
                    <p>
                        <strong>Your rating:</strong> {{ review.rating }}/5
                    </p>
                    <p class="card-text">
                        {{ review.review_text }}
                    </p>

                    <form method="post">
                        {% csrf_token %}

                        <button type="submit" class="btn btn-accent">
                            Yes, delete review
                        </button>

                        <a href="{% url 'my_reviews' %}" class="btn btn-outline">
                            Cancel
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
